<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Type" content="text/html;charset=UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Countdown to Physics Test</title><style>:root {--color: rgb(55, 53, 47);}body {background: rgba(0, 0, 0, 0);color: var(--color);font-family: iawriter-mono, Nitti, Menlo, Courier, monospace;margin: 0;}#timer {width: 100vw;height: 100vh;text-transform: uppercase;font-size: 1em;letter-spacing: 0.055em;display: flex;align-items: center;justify-content: space-between;text-align: center;max-width: 450px;}.days, .hours, .minutes, .seconds {padding: 20px 0;}#days {color: --color;}#hours {color: --color;}#minutes {color: --color;}#seconds {color: --color;}.numbers {font-weight: 700;font-size: 40px;text-align: center;}@media (prefers-color-scheme: dark) {:root {--color: rgba(255, 255, 255, 0.81);}}</style></head><body class="vsc-initialized"><div id="timer"><div class="days"><div id="days" class="numbers">27</div>days</div><div class="hours"><div id="hours" class="numbers">23</div>hours</div><div class="minutes"><div id="minutes" class="numbers">59</div>minutes</div><div class="seconds"> <div id="seconds" class="numbers">59</div>seconds</div></div><script>const year=(new Date).getFullYear(),myDate=new Date("2022-12-08T18:00:00.000Z"),padLeft=e=>String(e).length>2?e:String("00"+e).slice(-2);setInterval((function(){const e=(new Date).getTime(),t=myDate-e,n=padLeft(Math.floor(t/864e5)),a=padLeft(Math.floor(t%864e5/36e5)),o=padLeft(Math.floor(t%36e5/6e4)),d=padLeft(Math.floor(t%6e4/1e3));document.getElementById("days").innerHTML=n,document.getElementById("hours").innerHTML=a,document.getElementById("minutes").innerHTML=o,document.getElementById("seconds").innerHTML=d}),1e3);</script></body></html>
