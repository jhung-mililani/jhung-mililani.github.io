<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown to Physics Test</title>
    <style> 
      :root {
        --color: rgb(55, 53, 47);
      }
      /* change this to match system settings */
      body {
        background: rgba(0, 0, 0, 0); 
        color: var(--color);
        /* this font is the default font that notion uses */
        font-family: iawriter-mono, Nitti, Menlo, Courier, monospace;
        margin: 0;
      }

      #timer {
        width: 100vw;
        height: 100vh;
        text-transform: uppercase;
        font-size: 1em;
        letter-spacing: 0.055em;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: center;
        max-width: 450px;
      }
      /* the spacing between the numbers in the timer */
      .days,
      .hours,
      .minutes,
      .seconds {
        padding: 20px 0px;
      }

      /* next four show color of the numbers */
      #days {
        color: --color;
      }

      #hours {
        color: --color;
      }

      #minutes {
        color: --color;
      }

      #seconds {
        color: --color;
      }

      .numbers {
        font-weight: 700;
        font-size: 40px;
        text-align: center;
      } 
      
      @media (prefers-color-scheme: dark) {
        :root { 
        --color: rgba(255, 255, 255, 0.81); 
        }
      } 
    </style>
  </head>
  <body class="vsc-initialized">
    <div id="timer">
      <div class="days">
        <div id="days" class="numbers">27</div> days
      </div>
      <div class="hours">
        <div id="hours" class="numbers">23</div> hours
      </div>
      <div class="minutes">
        <div id="minutes" class="numbers">59</div> minutes
      </div>
      <div class="seconds">
        <div id="seconds" class="numbers">59</div> seconds
      </div>
    </div>
    <script>
      const year = new Date().getFullYear();
      // this is the date that should be adjusted according to the date you want to countdown to. 
      const myDate = new Date('2022-12-08T18:00:00.000Z');
      // this makes sure that numbers have leading zeroes. 
      const padLeft = (num) => {
        if (String(num).length > 2) {
          return num;
        }
        return String("00" + num).slice(-2);
      }
      // main function that will update the html
      setInterval(function() {
        // gets the current time 
        const today = new Date().getTime();
        // finds the time difference between the countdown and now 
        const diff = myDate - today;
        // next four constants make the difference human-readable
        const days = padLeft(Math.floor(diff / (1000 * 60 * 60 * 24)));
        const hours = padLeft(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
        const minutes = padLeft(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
        const seconds = padLeft(Math.floor((diff % (1000 * 60)) / 1000));
        // TODO: change these to while loops?
        // next four functions change the displayed html to show the counting down. 
        if (true) {
          document.getElementById("days").innerHTML = days;
        }
        if (true) {
          document.getElementById("hours").innerHTML = hours;
        }
        if (true) {
          document.getElementById("minutes").innerHTML = minutes
        }
        if (true) {
          document.getElementById("seconds").innerHTML = seconds;
        }
      }, 1000);
    </script>
  </body>
</html>
